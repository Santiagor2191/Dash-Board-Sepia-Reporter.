[build]
  command = "npm run build"
  publish = "dist"

# Backend como Netlify Function (reemplaza a Render). El codigo real vive en
# "../sepia meli api"; netlify/functions/api.mjs solo lo re-exporta.
[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# Rutas del backend -> funcion "api". Deben ir ANTES del fallback del SPA.
# Nota: NO usar public/_redirects — ese archivo tiene prioridad sobre este
# y su catch-all /* se tragaria las rutas del backend.
[[redirects]]
  from = "/db/*"
  to = "/.netlify/functions/api/db/:splat"
  status = 200

[[redirects]]
  from = "/meli/*"
  to = "/.netlify/functions/api/meli/:splat"
  status = 200

[[redirects]]
  from = "/auth/*"
  to = "/.netlify/functions/api/auth/:splat"
  status = 200

[[redirects]]
  from = "/ads/*"
  to = "/.netlify/functions/api/ads/:splat"
  status = 200

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/api/:splat"
  status = 200

[[redirects]]
  from = "/admin/*"
  to = "/.netlify/functions/api/admin/:splat"
  status = 200

[[redirects]]
  from = "/cron/*"
  to = "/.netlify/functions/api/cron/:splat"
  status = 200

[[redirects]]
  from = "/notifications"
  to = "/.netlify/functions/api/notifications"
  status = 200

[[redirects]]
  from = "/mcp-callback"
  to = "/.netlify/functions/api/mcp-callback"
  status = 200

# Fallback del SPA (rutas internas de React)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
